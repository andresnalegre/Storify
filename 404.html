<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Storify</title>
    <script>
      var path = window.location.pathname.replace('/Storify', '') || '/';
      var search = window.location.search;
      var hash = window.location.hash;
      var redirect = path + search + hash;
      window.location.replace(
        '/Storify/?redirect=' + encodeURIComponent(redirect)
      );
    </script>
  </head>
  <body></body>
</html>
